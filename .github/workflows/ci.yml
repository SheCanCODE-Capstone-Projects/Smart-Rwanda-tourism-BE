name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn -B compile

      # Checkstyle temporarily disabled - will be fixed later
      # - name: Checkstyle
      #   run: mvn -B checkstyle:check

      - name: Test
        run: mvn -B test
